<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Chosen Land — Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=Archivo:wght@400;500;600;700&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="cl-single">
  <div class="cl-stage">
    <header class="cl-atlas-head">
      <p class="cl-kicker">ATLAS FOR MYTH REAWAKENED</p>
      <h1>The Chosen Land</h1>
      <div class="rule"><span>ANNO 1938 - XXXX</span></div>
    </header>

    <div class="cl-card-lg" id="mapHost">
      <div class="cl-loading" style="width:62vh;max-width:80vw;">Charting the realms…</div>
    </div>

    <p class="cl-foot"><b>Hover</b> a realm for its name &nbsp;·&nbsp; <b>click</b> for its dossier &nbsp;·&nbsp; <b>Show names</b> reveals all labels</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="data.js"></script>
  <script src="themes.js"></script>
  <script src="engine.js"></script>
  <script>
    (async function boot(){
      const host = document.getElementById('mapHost');
      let geom;
      try { geom = await CL.buildGeometry(); }
      catch (err) {
        host.innerHTML = '<div class="cl-loading">Could not load map data — check your connection and reload.</div>';
        console.error(err); return;
      }
      host.innerHTML = '';
      const atlas = window.THEMES.find(t => t.id === 'atlas');
      CL.createMap(host, atlas, geom, { legend: false });
    })();
  </script>
</body>
</html>
